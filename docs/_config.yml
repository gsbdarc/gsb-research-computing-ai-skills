# Site-wide settings for GSB Research Computing & AI Skills
#
# This file is NOT auto-reloaded by `jekyll serve` — restart the server
# after changing anything here.

title: "GSB Research Computing & AI Skills"
tagline: "Stanford GSB · Research computing & AI skills"
author: GSB DARC Team
description: >-
  Hands-on research computing and AI skills for Stanford GSB researchers:
  the command line, the Yens cluster, SSH, JupyterHub, Python environments,
  SLURM, GPU jobs on the H200, and AI coding tools.

baseurl: '/gsb-research-computing-ai-skills'
url: 'https://gsbdarc.github.io'

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - vendor
  - .bundle

# Theme (use the gem directly — we're not on the legacy github-pages stack)
theme: just-the-docs
color_scheme: light
search_enabled: true
heading_anchors: true

# Syntax highlighting
highlighter: rouge

# Pretty permalinks (e.g. /day1/ instead of /day1.html)
permalink: pretty

# Top-right aux links
aux_links:
  GSB RCpedia:
    - 'https://rcpedia.stanford.edu'

# Course chat bot — URL of the deployed Cloudflare Worker.
# Leave empty during local dev and the widget will show a friendly placeholder.
# After deploying the Worker (see bot/README.md), set this to e.g.
#   https://rf-bootcamp-bot.gsbdarc.workers.dev
bot_worker_url: ''

# Just-the-Docs callouts
callouts:
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: red
  important:
    title: Important
    color: blue
  note:
    title: Note
    color: purple
  boss:
    title: Boss Battle
    color: yellow
  chest:
    title: Side Quest
    color: yellow
  weapon:
    title: Weapon Earned
    color: purple

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
